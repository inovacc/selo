# .goreleaser.yaml
# GoReleaser v2 config for the `selo` CLI.
# Docs: https://goreleaser.com
version: 2

project_name: selo

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: selo
    main: ./cmd/selo
    binary: selo
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      # The main-package vars link as `main.<name>` (the linker symbol for a
      # main package is always `main`, not the full import path).
      - -s -w
      - -X main.buildVersion={{.Version}}
      - -X main.buildCommit={{.Commit}}
      - -X main.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # linux/darwin/windows all support amd64+arm64, so no invalid combos to skip.

archives:
  - id: selo
    ids:
      - selo
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

source:
  enabled: true
  name_template: "{{ .ProjectName }}_{{ .Version }}_source"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: inovacc
    name: selo
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Tag }}"
