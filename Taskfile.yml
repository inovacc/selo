# https://taskfile.dev

version: '3'

tasks:
  test:
    desc: Fast unit tests (-short)
    cmds:
      - go test -short ./...

  test:full:
    desc: Full suite — race, fuzz seed corpus, benchmarks
    cmds:
      - go test -race -p=1 ./...
      - go test -run Fuzz ./...
      - go test -race -bench=. -benchmem -run=^$ ./...

  lint:
    desc: Format and lint
    cmds:
      - golangci-lint fmt
      - golangci-lint run --timeout=5m

  cover:
    desc: Coverage profile written to the system temp dir (datetime-stamped)
    cmds:
      - |
        f="${TMPDIR:-${TEMP:-/tmp}}/brdoc_coverage_$(date +%Y%m%d_%H%M%S).out"
        go test -covermode=atomic -coverprofile="$f" ./...
        go tool cover -func="$f" | tail -n 1
        echo "coverage profile: $f"

  upgrade:
    cmds:
      - go get -u ./...
      - go mod tidy -v

  build-dev:
    cmds:
      - goreleaser build --snapshot --clean

  release:check:
    desc: Validate .goreleaser.yaml (no build)
    cmds:
      - goreleaser check

  release:snapshot:
    desc: Build a local snapshot release into ./dist (no publish, no tag needed)
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Publish a real release (requires a pushed v* tag + GITHUB_TOKEN)
    cmds:
      - goreleaser release --clean

  build-prod:
    desc: Deprecated alias for release:snapshot
    cmds:
      - task: release:snapshot

  gen:ts:
    desc: Emit the TypeScript target into generated/typescript (all 13 kinds)
    cmds:
      - go run ./cmd/selo gen --lang ts --kind all --out generated/typescript

  gen:verify:ts:
    desc: Emit the TS target, then install deps and run the vitest suite (needs node)
    cmds:
      - task: gen:ts
      - cmd: |
          if command -v node >/dev/null 2>&1; then
            cd generated/typescript && npm install && npx vitest run
          else
            echo "node not found; skipping vitest (generated TS still emitted)"
          fi

  gen:js:
    desc: Emit the JavaScript target into generated/javascript (all 13 kinds)
    cmds:
      - go run ./cmd/selo gen --lang js --kind all --out generated/javascript

  gen:verify:js:
    desc: Emit the JS target, then install deps and run the vitest suite (needs node)
    cmds:
      - task: gen:js
      - cmd: |
          if command -v node >/dev/null 2>&1; then
            cd generated/javascript && npm install && npx vitest run
          else
            echo "node not found; skipping vitest (generated JS still emitted)"
          fi

  gen:ruby:
    desc: Emit the Ruby target into generated/ruby (all 13 kinds)
    cmds:
      - go run ./cmd/selo gen --lang ruby --kind all --out generated/ruby

  gen:verify:ruby:
    desc: Emit the Ruby target, then run the Minitest suite (needs ruby + bundler)
    cmds:
      - task: gen:ruby
      - cmd: |
          if command -v ruby >/dev/null 2>&1; then
            cd generated/ruby && bundle install && bundle exec rake test
          else
            echo "ruby not found; skipping Minitest (generated Ruby still emitted)"
          fi

  gen:java:
    desc: Emit the Java target into generated/java (all 13 kinds)
    cmds:
      - go run ./cmd/selo gen --lang java --kind all --out generated/java

  gen:verify:java:
    desc: Emit the Java target, then run the JUnit suite (needs Maven)
    cmds:
      - task: gen:java
      - cmd: |
          if command -v mvn >/dev/null 2>&1; then
            cd generated/java && mvn -B --no-transfer-progress test
          else
            echo "mvn not found; skipping JUnit (generated Java still emitted)"
          fi

  gen:csharp:
    desc: Emit the C# target into generated/csharp (all 13 kinds)
    cmds:
      - go run ./cmd/selo gen --lang csharp --kind all --out generated/csharp

  gen:verify:csharp:
    desc: Emit the C# target, then run the xUnit suite (needs the .NET SDK)
    cmds:
      - task: gen:csharp
      - cmd: |
          if command -v dotnet >/dev/null 2>&1; then
            cd generated/csharp && dotnet test --nologo
          else
            echo "dotnet not found; skipping xUnit (generated C# still emitted)"
          fi

  gen:python:
    desc: Emit the Python target into generated/python (all 13 kinds)
    cmds:
      - go run ./cmd/selo gen --lang python --kind all --out generated/python

  gen:verify:python:
    desc: Emit the Python target, then install it and run the pytest suite (needs python)
    cmds:
      - task: gen:python
      - cmd: |
          if command -v python >/dev/null 2>&1; then
            cd generated/python && python -m pip install -e . pytest && python -m pytest -q
          elif command -v python3 >/dev/null 2>&1; then
            cd generated/python && python3 -m pip install -e . pytest && python3 -m pytest -q
          else
            echo "python not found; skipping pytest (generated Python still emitted)"
          fi

  gen:php:
    desc: Emit the PHP target into generated/php (all 13 kinds)
    cmds:
      - go run ./cmd/selo gen --lang php --kind all --out generated/php

  gen:verify:php:
    desc: Emit the PHP target, then install deps and run the PHPUnit suite (needs php + composer)
    cmds:
      - task: gen:php
      - cmd: |
          if command -v php >/dev/null 2>&1 && command -v composer >/dev/null 2>&1; then
            cd generated/php && composer install && vendor/bin/phpunit
          else
            echo "php/composer not found; skipping PHPUnit (generated PHP still emitted)"
          fi

  gen:rust:
    desc: Emit the Rust target into generated/rust (all 13 kinds)
    cmds:
      - go run ./cmd/selo gen --lang rust --kind all --out generated/rust

  gen:verify:rust:
    desc: Emit the Rust target, then run the cargo test suite (needs cargo)
    cmds:
      - task: gen:rust
      - cmd: |
          if command -v cargo >/dev/null 2>&1; then
            cd generated/rust && cargo test
          else
            echo "cargo not found; skipping cargo test (generated Rust still emitted)"
          fi

  gen:all:
    desc: Emit all eight language targets
    cmds:
      - task: gen:ts
      - task: gen:js
      - task: gen:ruby
      - task: gen:java
      - task: gen:csharp
      - task: gen:python
      - task: gen:php
      - task: gen:rust
